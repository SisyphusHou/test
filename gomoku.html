<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋</title>
<link rel="stylesheet" href="css/gomoku.css">
</head>
<body>
<div class="game-container">
  <div class="controls-row">
    <div class="segmented-control" id="modeToggle">
      <button class="seg-btn active" data-mode="pvp">人人对战</button>
      <button class="seg-btn" data-mode="pvc">人机对战</button>
    </div>
    <div class="segmented-control hidden" id="difficultyToggle">
      <button class="seg-btn" data-diff="easy">简单</button>
      <button class="seg-btn active" data-diff="normal">一般</button>
      <button class="seg-btn" data-diff="hard">困难</button>
    </div>
  </div>

  <div class="info-panel">
    <div class="turn-indicator">
      <div class="turn-stone black-stone" id="turnStone"></div>
      <span id="turnText">黑棋落子</span>
    </div>

    <div class="score">
      <div class="score-item">
        <div class="score-dot black-dot"></div>
        <span>黑棋</span>
        <span class="score-value" id="scoreBlack">0</span>
      </div>
      <div class="score-item">
        <div class="score-dot white-dot"></div>
        <span>白棋</span>
        <span class="score-value" id="scoreWhite">0</span>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn" id="btnUndo" title="悔棋">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        <span>悔棋</span>
      </button>
      <button class="btn" id="btnReset" title="重新开始">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        <span>重新开始</span>
      </button>
    </div>
  </div>
  <div class="game-layout">
    <div class="board-section">
      <div class="board-wrapper">
    <canvas id="board"></canvas>
    <div class="win-overlay" id="winOverlay">
      <div class="win-card">
        <div class="win-stone" id="winStone"></div>
        <div class="win-text" id="winText"></div>
        <button class="btn-primary" id="btnNewGame">再来一局</button>
      </div>
    </div>
  </div>
    </div>
    <div class="history-panel" id="historyPanel">
      <div class="history-title">走棋记录</div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>
</div>

<script src="js/gomoku.js"></script>
</body>
</html>
